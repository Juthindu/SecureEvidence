<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="stylesheet" href="./css/login.css">
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
  <title>Secure Evidence</title>
  </head>
  <body>
    <div class="container">
      <dev class="loginPage">
        <div class="row">
          <div>
            <img id="loginLogo" width="40%" src="./images/logo02.png" alt="Secure Evidence Image" class="img-responsive center-block">
            <div id="loader"><p class="text-center font11">Please Connect Your Account</p></div>
            <div id="content" style="display: none;">
              <p id="accountAddress" class="text-center font11"></p>
              <div class="login-container ">
                <input type="text" class="form-control username-field" id="username" placeholder="Enter username">
                <button id="submitUsername" type="submit" class="login-button">Login</button>
              </div>
                <p id="loginMessage" class="text-center errorMessage" ></p>
            </div>
          </div>
        </div>
      </dev><!-- loginPage -->
    </div><!-- container -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/web3.min.js"></script>
  <script src="js/truffle-contract.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
